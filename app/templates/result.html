<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="card">
            <h1>Search Result</h1>
            <p class="secondary-text">
                The form was submitted successfully and the application is now
                showing the required Task 1 result page.
            </p>
            <p><strong>Your search term:</strong> {{ search_term }}</p>

            <div class="result-box">
                <p class="result-message">{{ message }}</p>
            </div>

            <div class="actions">
                <a href="{{ url_for('index') }}" class="button-link">Search Again</a>
            </div>
        </section>
    </main>
</body>
</html>
