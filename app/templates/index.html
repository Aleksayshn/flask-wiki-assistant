<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Wiki Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="card">
            <h1>Distributed Wiki Assistant</h1>
            <p class="lead">
                This Flask web application is the starter interface for a
                distributed search assignment. Enter a topic below to submit
                a simple search request.
            </p>

            {% if error_message %}
                <p class="error-message">{{ error_message }}</p>
            {% endif %}

            <form action="{{ url_for('search') }}" method="post" class="search-form">
                <label for="search_term">Search Term</label>
                <input
                    type="text"
                    id="search_term"
                    name="search_term"
                    value="{{ previous_term }}"
                    placeholder="e.g. Cloud Computing"
                >
                <button type="submit">Search</button>
            </form>
        </section>
    </main>
</body>
</html>
